services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: air -c .air.api.toml
    working_dir: /app
    environment:
      NATS_URL: nats://nats:4222
      MONGO_URI: mongodb://mongo:27017/queues
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - "8080:8080"
    depends_on:
      nats:
        condition: service_healthy
      mongo:
        condition: service_healthy

  consumer:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: air -c .air.consumer.toml
    working_dir: /app
    environment:
      NATS_URL: nats://nats:4222
      MONGO_URI: mongodb://mongo:27017/queues
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    depends_on:
      nats:
        condition: service_healthy
      mongo:
        condition: service_healthy

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8222/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:8.0
    environment:
      MONGO_INITDB_DATABASE: queues
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1 >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  go-mod-cache:
  go-build-cache:
  nats-data:
  mongo-data:
